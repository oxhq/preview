name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '12'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^12.0'
          - php: '8.4'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.0'
          - php: '8.4'
            laravel: '12'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^12.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Install Laravel ${{ matrix.laravel }} dependency set
        run: |
          composer require --no-interaction --no-progress --no-update \
            illuminate/console:${{ matrix.illuminate }} \
            illuminate/contracts:${{ matrix.illuminate }} \
            illuminate/filesystem:${{ matrix.illuminate }} \
            illuminate/support:${{ matrix.illuminate }} \
            orchestra/testbench:${{ matrix.testbench }} \
            phpunit/phpunit:${{ matrix.phpunit }}
          composer update --no-interaction --no-progress --prefer-dist

      - name: Run tests
        run: composer test

  release-surface:
    name: Release surface / PHP 8.3
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Verify release surface
        run: composer ci
