name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Verify release surface
        run: composer ci

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
          fi

          if ! git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Tag [${version}] does not exist. Create and push the tag before releasing."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "GitHub release [${VERSION}] already exists."
            exit 0
          fi

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes "Composer package release for oxhq/preview. Verify Packagist visibility after the repository webhook runs."
