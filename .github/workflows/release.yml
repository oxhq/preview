name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PACKAGE_NAME: oxhq/preview

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Verify package surface
        run: composer ci

      - name: Verify release archives
        run: |
          php scripts/check-source-archive.php
          php scripts/check-dist-archive.php

      - name: Verify PowerShell scripts
        shell: pwsh
        run: ./scripts/check-powershell-surface.ps1

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
          fi

          if ! git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Tag [${version}] does not exist. Create and push the tag before releasing."
            exit 1
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag [${version}] must look like vMAJOR.MINOR.PATCH."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Register or update Packagist package
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [ -n "${PACKAGIST_USERNAME}" ] && [ -n "${PACKAGIST_API_TOKEN}" ]; then
            php scripts/sync-packagist.php --ensure
          else
            echo "PACKAGIST_USERNAME/PACKAGIST_API_TOKEN are not available to this workflow."
            echo "Continuing in Packagist webhook mode; final Packagist visibility check will prove whether the package/webhook is configured."
          fi

      - name: Build release assets
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p release-assets
          composer archive --no-interaction --format=zip --dir=release-assets --file="preview-${VERSION}"
          (cd release-assets && sha256sum "preview-${VERSION}.zip" > SHA256SUMS)

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "GitHub release [${VERSION}] already exists."
            gh release upload "${VERSION}" release-assets/* --clobber
          else
            gh release create "${VERSION}" \
              release-assets/* \
              --title "${VERSION}" \
              --notes "Composer package release for ${PACKAGE_NAME}.

          Proof commands:
          - composer release:github -- -Version ${VERSION}
          - composer release:packagist -- ${VERSION}
          - composer smoke:packagist-install -- -Version ${VERSION}

          Packagist may need one webhook/update cycle before ${VERSION} is visible."
          fi

      - name: Verify GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: ./scripts/check-github-release.ps1 -Version $env:VERSION -RequireAssets

      - name: Request Packagist tag refresh
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [ -n "${PACKAGIST_USERNAME}" ] && [ -n "${PACKAGIST_API_TOKEN}" ]; then
            php scripts/sync-packagist.php --update
          else
            echo "PACKAGIST_USERNAME/PACKAGIST_API_TOKEN are not available to this workflow."
            echo "Waiting for Packagist's GitHub webhook/update cycle to expose the tag."
          fi

      - name: Verify Packagist version visibility
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: php scripts/check-packagist.php "${VERSION}" --wait=300 --interval=15
