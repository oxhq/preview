version: 2
updates:
  - package-ecosystem: composer
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - composer
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
